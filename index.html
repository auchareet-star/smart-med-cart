<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Medication Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app"></div>

<button type="button" class="btn-reset-float" onclick="resetDemo()">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
  </svg>
  Reset Demo
</button>

<!-- ══════════════════════════════════════════════════════════
     GLOBAL PIN MODAL (Lock system)
     ══════════════════════════════════════════════════════════ -->
<div class="pin-modal" id="pinModal" hidden>
  <div class="pin-modal-backdrop" onclick="closePinModal()"></div>
  <div class="pin-modal-card">
    <div class="pin-head">
      <div class="pin-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <div>
        <div class="pin-title">ยืนยันตัวตน</div>
        <div class="pin-sub">ป้อน PIN 4 หลัก เพื่อปลดล็อค</div>
      </div>
    </div>

    <div class="pin-target">กำลังขอเปิด: <b id="pinModalTarget">—</b></div>

    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <input type="password" id="pinInput" maxlength="4" inputmode="numeric" autocomplete="off" pattern="[0-9]*" oninput="onPinInput()" onkeydown="onPinKey(event)" />

    <div class="pin-error" id="pinError"></div>

    <div class="pin-actions">
      <button type="button" class="pin-btn-cancel" onclick="closePinModal()">ยกเลิก</button>
      <button type="button" class="pin-btn-ok" id="pinSubmitBtn" onclick="submitPin()" disabled>ยืนยัน</button>
    </div>

    <div class="pin-hint" id="pinHint">
      <div class="pin-hint-title">ผู้ใช้ในระบบ (demo)</div>
      <div class="pin-hint-list" id="pinHintList"></div>
    </div>
  </div>
</div>


<!-- Global slot detail modal (Zone 2) -->
<div class="pack-modal" id="slotModal" hidden>
  <div class="pack-modal-backdrop" onclick="closeSlotModal()"></div>
  <div class="pack-modal-card">
    <div class="pack-modal-head">
      <div class="pack-modal-title">รายการในช่อง</div>
      <button type="button" class="pack-modal-close" onclick="closeSlotModal()">×</button>
    </div>
    <div id="slotModalBody"></div>
    <div class="pack-modal-actions">
      <button type="button" class="mc-btn mc-btn-primary" onclick="closeSlotModal()">ปิด</button>
    </div>
  </div>
</div>

<!-- Cart Detail Modal -->
<div id="cartDetailModal" class="cdm-overlay" hidden onclick="if(event.target===this)closeCartDetail()">
  <div class="cdm-panel">
    <div class="cdm-header">
      <div class="cdm-title">รายละเอียดรถเข็น</div>
      <button type="button" class="cdm-close" onclick="closeCartDetail()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="cdm-body" id="cartDetailBody"></div>
  </div>
</div>

<!-- Add Cart Modal (multi-step: device list → form) -->
<div id="addCartModal" class="acm-overlay" hidden onclick="if(event.target===this)closeAddCartModal()">
  <div class="acm-dialog">
    <div class="acm-header">
      <div>
        <div class="acm-title" id="acmTitle">เพิ่มรถเข็นใหม่</div>
        <div class="acm-sub" id="acmSub">เลือก Device ที่รอยืนยัน</div>
      </div>
      <button type="button" class="acm-close" onclick="closeAddCartModal()" title="ปิด (ESC)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Step 1: pending device list + manual key -->
    <div id="acmStep1">
      <div id="acmDeviceList" class="acm-device-list"></div>

      <div class="acm-manual-divider">
        <span>หรือ</span>
      </div>
      <button type="button" class="acm-manual-toggle" id="acmManualToggle" onclick="toggleManualKeyForm()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        เพิ่ม Key ด้วยตนเอง
      </button>

      <form id="acmManualForm" class="acm-manual-form" hidden onsubmit="submitManualKey(event)">
        <div class="form-group">
          <label class="form-label">MAC Address <span class="acm-req">*</span></label>
          <input class="form-input form-input-mono" type="text" id="manualMac" placeholder="เช่น AA:BB:CC:DD:EE:FF" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">Secret Key <span class="acm-req">*</span></label>
          <input class="form-input form-input-mono" type="text" id="manualKey" placeholder="เช่น MC-KEY-XXXX-XXXX" autocomplete="off" />
          <div class="acm-field-error" id="manualKeyError"></div>
        </div>
        <div class="acm-manual-actions">
          <button type="button" class="acm-btn-back" onclick="toggleManualKeyForm()">ยกเลิก</button>
          <button type="submit" class="acm-btn-confirm">ยืนยัน Key</button>
        </div>
      </form>
    </div>

    <!-- Step 2: cart details form -->
    <div id="acmStep2" hidden>
      <div id="acmSelectedDevice"></div>
      <form id="addCartForm" onsubmit="submitAddCart(event)">
        <div class="form-group">
          <label class="form-label">ชื่อรถเข็น <span class="acm-req">*</span></label>
          <input class="form-input" type="text" id="newCartName" placeholder="เช่น รถเข็น F01" autocomplete="off" oninput="validateNewCartName()" />
          <div class="acm-field-error" id="newCartNameError"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Template ลิ้นชัก <span class="acm-req">*</span></label>
          <select class="form-input" id="newCartTemplate"></select>
        </div>
        <div class="form-group">
          <label class="form-label">หมายเลขครุภัณฑ์ <span class="acm-optional">(ไม่บังคับ)</span></label>
          <input class="form-input" type="text" id="newCartAsset" placeholder="เช่น MED-0042" autocomplete="off" />
        </div>
        <div class="acm-key-confirmed">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Key ยืนยันจาก Firmware อัตโนมัติ
        </div>
        <div class="acm-form-actions">
          <button type="button" class="acm-btn-back" onclick="backToPendingList()">← ย้อนกลับ</button>
          <button type="submit" class="acm-btn-confirm">ยืนยันและเพิ่มรถ</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Add Cart Toast -->
<div id="addCartToast" class="acm-toast" hidden>
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="addCartToastMsg"></span>
</div>

<!-- ══════════════════════════════════════════════════════════
     PG-CART
     ══════════════════════════════════════════════════════════ -->
<template id="pg-cart">
<div class="page">

  <nav class="topnav">
    <div class="topnav-inner">
      <div class="topnav-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="3" width="14" height="14" rx="2"/>
            <line x1="5" y1="8" x2="19" y2="8"/>
            <line x1="5" y1="13" x2="19" y2="13"/>
            <circle cx="8" cy="20" r="1.5"/>
            <circle cx="16" cy="20" r="1.5"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Smart Medication Cart</div>
          <div class="brand-sub">ระบบรถเข็นยาอัจฉริยะ</div>
        </div>
      </div>
      <div class="topnav-spacer"></div>
      <div class="nav-ctx-pill">
        <span class="nav-chip" data-cart-shortid>A01</span>
        <span class="nav-ctx-sep"></span>
        <span class="nav-chip nav-chip-ghost" data-ward-name>Ward 3A</span>
        <span class="nav-ctx-sep"></span>
        <span class="nav-online-pill"><span class="nav-online-dot"></span>Online</span>
      </div>
      <div class="topnav-spacer"></div>
      <div class="topnav-right">
        <div class="nav-clock">
          <div class="clock-time" id="clock">--:--:--</div>
          <div class="clock-date" id="dateTh"></div>
        </div>
      </div>
    </div>
  </nav>

  <div class="cart-body">

    <!-- LEFT: gradient panel with cart illustration -->
    <div class="cart-image-wrap">
      <svg class="cart-svg" viewBox="0 0 200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- sparkles -->
        <circle cx="30" cy="60" r="2" fill="#9ad9b9" opacity=".6"/>
        <circle cx="165" cy="80" r="2.5" fill="#9ad9b9" opacity=".6"/>
        <circle cx="175" cy="180" r="2" fill="#9ad9b9" opacity=".6"/>
        <circle cx="25" cy="200" r="2" fill="#9ad9b9" opacity=".5"/>
        <path d="M40 90 l3 0 M41.5 88.5 l0 3" stroke="#7bc9a3" stroke-width="1" stroke-linecap="round"/>
        <path d="M160 140 l3 0 M161.5 138.5 l0 3" stroke="#7bc9a3" stroke-width="1" stroke-linecap="round"/>

        <!-- cart body -->
        <rect x="50" y="40" width="100" height="175" rx="14" fill="#ffffff" stroke="#2dbfa3" stroke-width="2.2"/>
        <!-- handle -->
        <rect x="70" y="52" width="60" height="10" rx="4" fill="#c7ebd9"/>
        <rect x="78" y="55" width="30" height="4" rx="2" fill="#2dbfa3" opacity=".5"/>
        <!-- drawers -->
        <rect x="60" y="78"  width="80" height="26" rx="6" fill="#eaf8f0" stroke="#2dbfa3" stroke-width="1.3"/>
        <rect x="90" y="89"  width="20" height="4"  rx="2" fill="#2dbfa3"/>
        <rect x="60" y="112" width="80" height="26" rx="6" fill="#eaf8f0" stroke="#2dbfa3" stroke-width="1.3"/>
        <rect x="90" y="123" width="20" height="4"  rx="2" fill="#2dbfa3"/>
        <rect x="60" y="146" width="80" height="26" rx="6" fill="#eaf8f0" stroke="#2dbfa3" stroke-width="1.3"/>
        <rect x="90" y="157" width="20" height="4"  rx="2" fill="#2dbfa3"/>
        <rect x="60" y="180" width="80" height="26" rx="6" fill="#eaf8f0" stroke="#2dbfa3" stroke-width="1.3"/>
        <rect x="90" y="191" width="20" height="4"  rx="2" fill="#2dbfa3"/>

        <!-- legs -->
        <line x1="72"  y1="215" x2="72"  y2="235" stroke="#2dbfa3" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="128" y1="215" x2="128" y2="235" stroke="#2dbfa3" stroke-width="2.2" stroke-linecap="round"/>

        <!-- wheels -->
        <circle cx="72"  cy="244" r="10" fill="#ffffff" stroke="#2dbfa3" stroke-width="2.2"/>
        <circle cx="72"  cy="244" r="4"  fill="#2dbfa3"/>
        <circle cx="128" cy="244" r="10" fill="#ffffff" stroke="#2dbfa3" stroke-width="2.2"/>
        <circle cx="128" cy="244" r="4"  fill="#2dbfa3"/>
      </svg>
    </div>

    <!-- RIGHT: content -->
    <div class="cart-right">

      <div class="cart-heading">
        <div class="page-title">ข้อมูลรถเข็นยา</div>
        <div class="page-sub">ตรวจสอบข้อมูลรถเข็นก่อนเริ่มใช้งานทุกครั้ง</div>
      </div>

      <!-- header card -->
      <div class="cart-header-card">
        <div class="cart-header-left">
          <div class="cart-avatar" id="cartInfoAvatar">—</div>
          <div>
            <div class="cart-name" id="cartInfoName">—</div>
            <div class="cart-meta">
              <span id="cartInfoHwId">—</span><span class="sep">·</span>
              <span>OmniRx Pro X2</span>
            </div>
          </div>
        </div>
        <button type="button" class="btn-ready">
          <span class="btn-ready-dot"></span>พร้อมใช้งาน
        </button>
      </div>

      <!-- stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/>
            </svg>
          </div>
          <div class="stat-label">รถเข็น</div>
          <div class="stat-value" id="cartInfoStatName">—</div>
          <div class="stat-sub" id="cartInfoStatHw">—</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
            </svg>
          </div>
          <div class="stat-label">ใช้งานล่าสุด</div>
          <div class="stat-value">วันนี้ 08:42</div>
          <div class="stat-sub">นส.สมใจ ดีมาก</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon-wrap ic-amber">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="17" height="10" rx="2"/>
              <path d="M22 11v2" stroke-width="2.5"/>
              <path d="M13 9l-2 3h3l-2 3"/>
            </svg>
          </div>
          <div class="stat-label">แบตเตอรี่ (กำลังชาร์จ)</div>
          <div class="batt-row">
            <div class="batt-track"><div class="batt-fill"></div></div>
            <span class="batt-pct">85%</span>
          </div>
          <div class="stat-sub">ใช้งานได้ประมาณ 6 ชม. 48 นาที</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/>
              <circle cx="12" cy="6" r="1" fill="currentColor" stroke="none"/>
              <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
              <circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/>
            </svg>
          </div>
          <div class="stat-label">Drawer</div>
          <div class="stat-value"><span id="cartInfoDrawerCount">—</span> <span class="stat-unit">ลิ้นชัก</span></div>
        </div>

        <div class="stat-card">
          <div class="stat-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
              <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
          </div>
          <div class="stat-label">Cassette พร้อม</div>
          <div class="stat-value"><span id="cartInfoCassetteCount">—</span> <span class="stat-unit">ช่อง</span></div>
        </div>

        <div class="stat-card">
          <div class="stat-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12.5A9.97 9.97 0 0112 10c2.7 0 5.16 1.07 6.97 2.8"/>
              <path d="M8.5 15.5A5.01 5.01 0 0112 14c1.36 0 2.6.55 3.5 1.43"/>
              <circle cx="12" cy="19" r="1" fill="currentColor" stroke="none"/>
              <path d="M2 8.5A14.95 14.95 0 0112 5c3.84 0 7.35 1.45 9.99 3.83"/>
            </svg>
          </div>
          <div class="stat-label">การเชื่อมต่อ</div>
          <div class="wifi-name">Wi-Fi</div>
          <div class="wifi-detail">-52 dBm · สัญญาณแรง</div>
        </div>
      </div>

      <!-- ENV -->
      <div class="env-section">
        <div class="env-header">
          <div>
            <div class="env-title">สภาพแวดล้อม Drawer / Cassette</div>
            <div class="env-updated">อัปเดตล่าสุด วันนี้ 08:42</div>
          </div>
          <div class="env-actions">
            <span class="pill pill-green">ปกติ</span>
            <button type="button" class="btn-toggle" id="toggleBtn" onclick="toggleEnv()">
              แสดงรายละเอียด
              <svg class="chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 9l6 6 6-6"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="avg-row">
          <div class="avg-card">
            <div class="avg-label">Drawer AVG</div>
            <div class="avg-value">24.2°C</div>
            <div class="avg-sub">ความชื้น 49% RH</div>
          </div>
          <div class="avg-card">
            <div class="avg-label">Cassette AVG</div>
            <div class="avg-value">24.5°C</div>
            <div class="avg-sub">ความชื้น 50% RH · 36 ช่อง</div>
          </div>
        </div>

        <div id="envDetails">
          <div class="env-table-wrap">
            <table class="env-table">
              <thead>
                <tr>
                  <th>Drawer</th><th>Drawer Temp</th><th>Drawer RH</th>
                  <th>Cassette Temp</th><th>Cassette RH</th><th>สถานะ</th>
                </tr>
              </thead>
              <tbody id="drawerTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- actions -->
      <div class="cart-actions">
        <button type="button" class="btn-start" onclick="location.hash='#pg-confirm'">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          เริ่มใช้งาน
        </button>
        <button type="button" class="btn-secondary" onclick="openAdminLogin()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
            Admin Console
          </button>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
    <div class="footer-left">
      <span>Med Cart v3.2.1</span>
      <span class="footer-sep">·</span>
      <span data-hw-id>MC-A-001</span>
      <span class="footer-sep">·</span>
      <div class="footer-batt">
        <div class="mini-batt"><div class="mini-batt-fill"></div></div>
        <span>85%</span>
      </div>
    </div>
    <button type="button" class="btn-cart-detail" onclick="openCartDetail()">รายละเอียดรถเข็น</button>
    </div>
  </footer>

</div>
</template>


<!-- ══════════════════════════════════════════════════════════
     PG-CONFIRM — ยืนยัน Ward
     ══════════════════════════════════════════════════════════ -->
<template id="pg-confirm">
<div class="page">

  <nav class="topnav">

<script src="script.js"></script>
<script>
  function render(hash) {
    const id  = hash.replace('#', '') || 'pg-cart';
    const tpl = document.getElementById(id);
    const app = document.getElementById('app');
    app.innerHTML = '';
    if (!tpl) {
      app.innerHTML = `<p style="padding:40px;color:#6b7280;">ไม่พบหน้า: ${id}</p>`;
      return;
    }
    app.appendChild(tpl.content.cloneNode(true));
    initPage();
  }
  window.addEventListener('hashchange', () => {
    if (typeof saveNavState === 'function') saveNavState();
    render(location.hash);
  });
  render(location.hash || '#pg-cart');
</script>
